    <style>
        body {
            font-family: Arial, sans-serif;
        }

        header {
            background: #ddd;
            padding: 10px;
            text-align: center;
            font-size: 24px;
        }

        .container {
            display: flex;
        }

        nav {
            width: 100px;
            border-right: 1px solid #000;
        }

        nav a {
            display: block;
            padding: 10px;
            border-bottom: 1px solid #000;
            text-decoration: none;
            color: black;
        }

        nav a:hover {
            background: #f0f0f0;
        }

        main {
            flex: 1;
            padding: 10px;
        }

        .images {
            display: flex;
            gap: 10px;
        }

        footer {
            margin-top: 20px;
            border-top: 1px solid #000;
            padding: 10px;
        }

        /* Text care se mișcă */
        .marquee {
            white-space: nowrap;
            overflow: hidden;
            box-sizing: border-box;
        }

        .marquee span {
            display: inline-block;
            padding-left: 100%;
            animation: scroll 10s linear infinite;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
